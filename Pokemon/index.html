<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon App</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-cover bg-center bg-no-repeat"
      style="background-image: url('./src/images/Background.png');">

<!-- ================= MAIN CONTAINER ================= -->
<div class="min-h-screen flex flex-col items-center p-3 md:p-6 space-y-4 md:space-y-6">

  <!-- ================= SEARCH BAR ================= -->
  <section
    id="searchBarContent"
    class="flex bg-white/80 rounded-2xl shadow-xl overflow-hidden
           w-full max-w-[1100px]
           h-[55px] md:h-[65px]">

    <div id="favoriteBtn"
         class="border-r px-3 md:px-5 flex items-center cursor-pointer">
      <img src="./src/images/FavoriteList.png" class="w-6 md:w-8">
    </div>

    <div id="randomBtn"
         class="border-r px-3 md:px-5 flex items-center cursor-pointer">
      <img src="./src/images/Random.png" class="w-6 md:w-8">
    </div>

    <div class="flex-1 px-3 md:px-5 flex items-center">
      <input id="userInput"
             type="text"
             placeholder="Search Pokémon..."
             class="w-full bg-transparent outline-none
                    text-lg md:text-2xl">
    </div>

    <div id="EnterBtn"
         class="border-l px-3 md:px-5 flex items-center cursor-pointer">
      <img src="./src/images/Search.png" class="w-6 md:w-8">
    </div>

  </section>

  <!-- ================= POKÉMON INFO ================= -->
  <section
    class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl
           w-full max-w-[1100px]
           p-4 md:p-8
           space-y-5
           overflow-y-auto">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-center gap-3 md:gap-5">

      <img id="favoriteStar"
           src="./src/images/star.png"
           class="w-8 md:w-12 cursor-pointer">

      <h2 id="pokemonName"
          class="text-3xl md:text-5xl font-bold capitalize"></h2>

      <span id="pokedexNumber"
            class="text-xl md:text-3xl text-gray-700"></span>

    </div>

    <!-- Image + Form -->
    <div class="flex flex-col items-center space-y-2 md:space-y-3">

      <img id="mainImg"
           class="w-40 h-40 md:w-64 md:h-64 object-contain cursor-pointer">

      <p id="form"
         class="text-lg md:text-xl text-gray-600">
         Form: Default
      </p>

    </div>

    <!-- Types -->
    <div id="types"
         class="flex justify-center flex-wrap gap-2 md:gap-4
                text-lg md:text-xl font-semibold"></div>

    <!-- Info Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">

      <div id="evolutionBox"
           class="bg-green-200/70 rounded-xl p-3 md:p-4
                  text-sm md:text-base
                  md:col-span-2">
        Evolution Line
      </div>

      <div id="moves"
           class="bg-blue-200/70 rounded-xl p-3 md:p-4
                  text-sm md:text-base
                  max-h-40 md:max-h-60 overflow-y-auto">
        Moves
      </div>

      <div id="abilities"
           class="bg-yellow-200/70 rounded-xl p-3 md:p-4
                  text-sm md:text-base">
        Abilities
      </div>

      <div id="locations"
           class="bg-red-200/70 rounded-xl p-3 md:p-4
                  text-sm md:text-base
                  md:col-span-2
                  max-h-40 md:max-h-60 overflow-y-auto">
        Locations
      </div>

    </div>

  </section>

</div>

<!-- ================= FAVORITES PANEL ================= -->
<div id="favoritesPanel"
     class="fixed top-0 left-0 h-full w-64
            bg-black/70 backdrop-blur-md
            text-white p-4
            transform -translate-x-full
            transition-transform duration-300 z-50">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Favorites</h2>

    <img id="closeFavorites"
         src="./src/images/XOut.png"
         class="w-8 cursor-pointer">
  </div>

  <ul id="favoritesList" class="space-y-2"></ul>

</div>

<script src="./src/Script/script.js"></script>

</body>
</html>
